services:
  # ── API ───────────────────────────────────────────────────────
  - type: web
    name: control-tower-ai-api
    env: node
    region: oregon
    plan: starter
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

    # dist/ is committed — skip tsc entirely. Just install runtime deps.
    buildCommand: cd server && npm install --omit=dev

    # Migrate then start from the committed dist/
    startCommand: cd server && sh start.sh

    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: control-tower-ai-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: control-tower-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: LOG_LEVEL
        value: info
      - key: CLIENT_ORIGIN
        value: https://control-tower-ai-client.onrender.com

  # ── Client ────────────────────────────────────────────────────
  - type: web
    name: control-tower-ai-client
    env: static
    region: oregon
    plan: starter

    # client/dist/ is committed — no build needed
    buildCommand: echo "dist already committed"
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://control-tower-ai-api.onrender.com

databases:
  - name: control-tower-ai-db
    databaseName: control_tower_ai
    plan: starter
    region: oregon
