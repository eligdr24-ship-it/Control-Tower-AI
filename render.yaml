services:
  # ── API (Express + Prisma) ────────────────────────────────────
  #
  # dist/ is committed to the repo — no TypeScript compilation on Render.
  # This eliminates Prisma binary download failures and stale-dist issues.
  #
  # Build: install production dependencies only (postinstall runs prisma generate)
  # Start: run DB migrations then launch the pre-compiled server
  - type: web
    name: control-tower-ai-api
    env: node
    region: oregon
    plan: starter
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    buildCommand: cd server && npm install --omit=dev
    startCommand: cd server && sh start.sh
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: control-tower-ai-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: control-tower-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: LOG_LEVEL
        value: info
      - key: CLIENT_ORIGIN
        value: https://control-tower-ai-client.onrender.com

      # Add manually in Render Dashboard → API service → Environment:
      # GOOGLE_CLIENT_ID
      # GOOGLE_CLIENT_SECRET
      # GOOGLE_REDIRECT_URI = https://control-tower-ai-api.onrender.com/api/v1/auth/google/callback
      # ENCRYPTION_KEY      = node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"

  # ── Client (React static site) ────────────────────────────────
  #
  # client/dist/ is committed — Render serves it directly, no build step.
  - type: web
    name: control-tower-ai-client
    env: static
    region: oregon
    plan: starter
    # No buildCommand needed — dist/ is already built and committed
    buildCommand: echo "client/dist already built and committed"
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://control-tower-ai-api.onrender.com

databases:
  - name: control-tower-ai-db
    databaseName: control_tower_ai
    plan: starter
    region: oregon
