services:
  # ── Static site (React client) ──────────────────────────────
  - type: web
    name: control-tower-ai-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://control-tower-ai-api.onrender.com

  # ── Web service (Express API) ───────────────────────────────
  - type: web
    name: control-tower-ai-api
    env: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CLIENT_ORIGIN
        value: https://control-tower-ai-client.onrender.com
      # Add these via Render Dashboard → Environment (keep secrets out of this file):
      # DATABASE_URL, REDIS_URL, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
      # ANTHROPIC_API_KEY, JWT_SECRET, SESSION_SECRET
