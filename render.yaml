services:
  # ── API (Express + Prisma) ────────────────────────────────────
  # Render service name: control-tower-ai-api
  # This produces the URL:  https://control-tower-ai-api.onrender.com
  - type: web
    name: control-tower-ai-api
    env: node
    region: oregon
    plan: starter
    buildCommand: cd server && npm install && npm run db:generate && npm run build
    startCommand: cd server && npm run db:migrate && node dist/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: control-tower-ai-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: control-tower-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: LOG_LEVEL
        value: info

      # ── CORS: must match the client service URL exactly ────────
      # The client service below is named "control-tower-ai-client"
      # which produces https://control-tower-ai-client.onrender.com
      # If you add a custom domain, append it comma-separated:
      #   https://control-tower-ai-client.onrender.com,https://app.yourdomain.com
      - key: CLIENT_ORIGIN
        value: https://control-tower-ai-client.onrender.com

      # ── Add these manually in Render Dashboard → Environment ───
      # GOOGLE_CLIENT_ID
      # GOOGLE_CLIENT_SECRET
      # GOOGLE_REDIRECT_URI = https://control-tower-ai-api.onrender.com/api/v1/auth/google/callback
      # ENCRYPTION_KEY      = node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"

  # ── Client (React static site) ────────────────────────────────
  # Render service name: control-tower-ai-client
  # This produces the URL:  https://control-tower-ai-client.onrender.com
  - type: web
    name: control-tower-ai-client
    env: static
    region: oregon
    plan: starter
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # ── Must point to the API service URL above ─────────────────
      # This is embedded into the JS bundle at build time by Vite.
      # If you rename the API service, update this value to match.
      - key: VITE_API_URL
        value: https://control-tower-ai-api.onrender.com

databases:
  - name: control-tower-ai-db
    databaseName: control_tower_ai
    plan: starter
    region: oregon
